<!DOCTYPE html>
<html lang="pl">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'catalog/style.css' %}">
    <meta charset="UTF-8">
    <title>Recenzje Gier</title>
</head>
<body>
<div class="game-detail">

    <div class="game-detail__header">
        <h1>Recenzje gry: {{ game.title }}</h1>
    </div>

    <div class="reviews-list">

        {% for review in reviews %}
        <div class="review-card">

            <div class="review-score">
                ⭐ {{ review.score }}/10
            </div>

            <div class="review-text">
                {{ review.text }}
            </div>

            <div class="review-meta">
                #{{ forloop.counter }}
            </div>

        </div>
        {% empty %}
        <p class="text-warning" style="text-align:center;">
            Brak recenzji dla tej gry
        </p>
        {% endfor %}

    </div>

    <a href="{% url 'game_detail' game.pk %}" class="back-link">
        ← Wróć
    </a>

</div>
</body>
</html>
