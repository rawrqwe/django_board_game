<!DOCTYPE html>
<html lang="pl">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'catalog/style.css' %}">
    <meta charset="UTF-8">
    <title>Dodawanie Recenzji</title>
</head>
<body>
    <h1>Dodaj recenzje do {{game.title}}</h1>

        {% csrf_token %}

    <a href="{% url 'game_detail' game.pk %}">Wróć</a>
</body>
</html>
